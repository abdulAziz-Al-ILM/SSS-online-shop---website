<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSS Online Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-[#0f172a] text-white overflow-x-hidden">

    <div class="fixed top-6 right-6 flex space-x-2 z-50">
        <button onclick="changeLang('uz')" class="px-3 py-1 glass-card border border-white/10 rounded-lg text-xs font-bold">УЗ</button>
        <button onclick="changeLang('ru')" class="px-3 py-1 glass-card border border-white/10 rounded-lg text-xs font-bold">РУ</button>
        <button onclick="changeLang('kg')" class="px-3 py-1 glass-card border border-white/10 rounded-lg text-xs font-bold">КГ</button>
    </div>

    <header class="relative w-full h-[65vh] flex items-end">
        <div class="absolute inset-0 z-0">
            {% if info.logo_id %}
            <img src="/api/image/{{ info.logo_id }}" class="w-full h-full object-cover brightness-[0.4] blur-xl scale-125">
            {% endif %}
        </div>

        <div class="absolute inset-0 bg-gradient-to-t from-[#0f172a] via-[#0f172a]/70 to-transparent z-10"></div>

        <div class="relative z-20 max-w-6xl mx-auto px-6 pb-12 w-full flex flex-col items-center md:items-start">
            <div class="glass-card p-4 rounded-[2.5rem] border-2 border-white/10 shadow-2xl mb-6">
                {% if info.logo_id %}
                <img src="/api/image/{{ info.logo_id }}" class="h-32 w-32 md:h-44 md:w-44 object-contain">
                {% else %}
                <div class="h-32 w-32 flex items-center justify-center text-5xl font-bold text-[#facc15]">SSS</div>
                {% endif %}
            </div>
            <div class="text-center md:text-left">
                <h1 class="text-6xl md:text-8xl font-bold tracking-tighter leading-none mb-2">SSS</h1>
                <p class="text-[#facc15] font-bold uppercase tracking-[0.4em] text-xs md:text-sm">Construction Materials Shop</p>
            </div>
        </div>
    </header>

    <section class="text-center py-10">
        <p id="site-subtitle" class="text-gray-400 italic mb-8">Доим хизматингиздамиз!</p>
        <a href="#katalog" id="btn-katalog" class="btn-neon px-12 py-4 rounded-2xl text-lg font-bold tracking-widest uppercase">Каталогга ўтиш</a>
    </section>

    <div id="ads-container" class="max-w-6xl mx-auto px-6 mb-12"></div>
    
    <div class="max-w-6xl mx-auto px-6 mb-20 grid grid-cols-2 md:grid-cols-4 gap-4">
        <a href="{{ info.telegram_bot }}" class="glass-card p-6 text-center rounded-3xl"><i class="fa-brands fa-telegram text-3xl mb-2 text-blue-400"></i><p id="label-bot" class="text-sm font-bold">Бот</p></a>
        <a href="{{ info.telegram_channel }}" class="glass-card p-6 text-center rounded-3xl"><i class="fa-solid fa-bullhorn text-3xl mb-2 text-blue-300"></i><p id="label-channel" class="text-sm font-bold">Канал</p></a>
        <a href="{{ info.whatsapp }}" class="glass-card p-6 text-center rounded-3xl"><i class="fa-brands fa-whatsapp text-3xl mb-2 text-green-400"></i><p class="text-sm font-bold">WhatsApp</p></a>
        <a href="{{ info.instagram }}" class="glass-card p-6 text-center rounded-3xl"><i class="fa-brands fa-instagram text-3xl mb-2 text-pink-500"></i><p class="text-sm font-bold">Instagram</p></a>
    </div>

    <section class="max-w-6xl mx-auto px-6 mb-20">
        <h2 id="services-title" class="text-3xl font-bold mb-10 border-l-4 border-[#facc15] pl-4 uppercase">Хизматлар</h2>
        <div id="services-container" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </section>

    <section id="katalog" class="max-w-6xl mx-auto px-6 mb-20">
        <h2 id="katalog-title" class="text-3xl font-bold mb-10 border-l-4 border-[#facc15] pl-4 uppercase">Маҳсулотлар</h2>
        <div id="products-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8"></div>
    </section>

    <footer class="bg-[#1e293b] py-20 mt-auto border-t border-white/5">
        <div class="max-w-6xl mx-auto px-6">
            <div id="locations-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12"></div>
            <div class="glass-card p-10 text-center rounded-[2.5rem]">
                <h3 id="about-title" class="text-2xl font-bold text-[#facc15] mb-4">Фирма ҳақида</h3>
                <p class="text-gray-300 mb-6">{{ info.about }}</p>
                <p class="text-3xl font-bold"><i class="fa-solid fa-phone text-[#facc15] mr-2"></i>{{ info.phone }}</p>
            </div>
        </div>
    </footer>

    <script>const BOT_URL = "{{ info.telegram_bot }}";</script>
    <script src="/static/js/script.js"></script>
</body>
</html>
