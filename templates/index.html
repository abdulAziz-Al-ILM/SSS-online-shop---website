<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qurilish Mollari | ILM Construction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { navy: '#0f172a', navy_light: '#1e293b', neon_yellow: '#facc15', neon_orange: '#f97316' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Rajdhani', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="antialiased min-h-screen flex flex-col relative overflow-x-hidden">
    <div class="fixed top-0 left-1/4 w-96 h-96 bg-neon_yellow/10 rounded-full blur-[120px] -z-10"></div>
    <div class="fixed bottom-0 right-1/4 w-96 h-96 bg-neon_orange/10 rounded-full blur-[120px] -z-10"></div>

    <header class="pt-16 pb-8 px-6 text-center">
        <h1 class="font-heading text-5xl md:text-7xl font-bold text-white mb-4 uppercase tracking-wider text-glow">
            Qurilish <span class="text-neon_yellow">Mollari</span>
        </h1>
        <p class="text-xl md:text-2xl text-gray-300 font-heading mb-6">Doim xizmatingizdamiz!</p>
        <div class="inline-flex space-x-4">
            <a href="#katalog" class="btn-neon px-8 py-3 rounded-lg text-lg uppercase tracking-wide">Katalogga o'tish</a>
        </div>
    </header>

    <section id="ads-container" class="max-w-6xl mx-auto px-6 mb-12 w-full"></section>

    <section class="max-w-6xl mx-auto px-6 mb-16 w-full grid grid-cols-2 md:grid-cols-4 gap-4">
        <a href="#" class="glass-card flex flex-col items-center py-6 text-blue-400 hover:text-neon_yellow transition">
            <i class="fa-brands fa-telegram text-4xl mb-2"></i><span class="font-heading font-bold">Botga o'tish</span>
        </a>
        <a href="#" class="glass-card flex flex-col items-center py-6 text-blue-300 hover:text-neon_yellow transition">
            <i class="fa-solid fa-bullhorn text-4xl mb-2"></i><span class="font-heading font-bold">Kanalimiz</span>
        </a>
        <a href="#" class="glass-card flex flex-col items-center py-6 text-green-400 hover:text-neon_yellow transition">
            <i class="fa-brands fa-whatsapp text-4xl mb-2"></i><span class="font-heading font-bold">WhatsApp</span>
        </a>
        <a href="#" class="glass-card flex flex-col items-center py-6 text-pink-500 hover:text-neon_yellow transition">
            <i class="fa-brands fa-instagram text-4xl mb-2"></i><span class="font-heading font-bold">Instagram</span>
        </a>
    </section>

    <section class="max-w-6xl mx-auto px-6 mb-16 w-full">
        <h2 class="font-heading text-3xl font-bold mb-6 border-l-4 border-neon_yellow pl-4 text-white">Bizning Xizmatlar</h2>
        <div id="services-container" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </section>

    <section id="katalog" class="max-w-6xl mx-auto px-6 mb-16 w-full flex-grow">
        <h2 class="font-heading text-3xl font-bold mb-6 border-l-4 border-neon_yellow pl-4 text-white">Arzon Qurilish Mollari</h2>
        <div id="products-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8"></div>
    </section>

    <section class="bg-navy_light border-t border-white/10 mt-auto">
        <div class="max-w-6xl mx-auto px-6 py-12">
            <h2 class="font-heading text-3xl font-bold mb-8 text-center text-white text-glow">Bizning Manzillar va Kontaktlar</h2>
            <div id="locations-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8"></div>
            
            <div class="glass-card p-6 text-center border-neon_orange/50">
                <h3 class="font-heading text-2xl text-neon_yellow mb-2"><i class="fa-solid fa-circle-info"></i> Firma haqida</h3>
                <p class="text-gray-300 max-w-2xl mx-auto">{{ info.about }}</p>
                <p class="text-white font-mono text-xl mt-4"><i class="fa-solid fa-phone text-neon_yellow"></i> {{ info.phone }}</p>
            </div>
        </div>
    </section>

    <div id="order-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex-col items-center justify-center">
        <div class="glass-card w-full max-w-md p-8 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <h3 class="font-heading text-2xl text-neon_yellow mb-4">Buyurtma berish</h3>
            <div id="modal-product-name" class="text-lg text-white mb-4 font-bold"></div>
            <form id="order-form" onsubmit="submitOrder(event)">
                <input type="hidden" id="product_id">
                <input type="text" id="user_name" required placeholder="Ismingiz" class="w-full bg-navy border border-gray-600 rounded px-4 py-3 text-white mb-4 focus:border-neon_yellow outline-none">
                <input type="tel" id="user_phone" required placeholder="+998..." class="w-full bg-navy border border-gray-600 rounded px-4 py-3 text-white mb-6 focus:border-neon_yellow outline-none">
                <button type="submit" class="w-full btn-neon py-3 rounded-lg text-lg">Tasdiqlash</button>
            </form>
        </div>
    </div>
    <script src="/static/js/script.js"></script>
</body>
</html>
